<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | NovaTech Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/Website/Admin/style.css">
</head>

<body>
    <!-- Sidebar (Hidden for normal users, or minimal) -->
    <nav class="sidebar" style="display: none;">
    </nav>

    <main class="main-content" style="margin-left: 0;">
        <header>
            <div class="search-box">
                <i class="fa-solid fa-search"></i>
                <input type="text" placeholder="Tìm kiếm...">
            </div>
            <div class="user-info">
                <a href="/Website/profile/index.html">
                    <span id="header-username">User</span>
                    <img id="header-avatar" src="https://ui-avatars.com/api/?name=User&background=3b82f6&color=fff" alt="User">
                </a>
                <button onclick="handleLogout()" style="margin-left: 15px; background: none; border: none; color: #ef4444; cursor: pointer; font-size: 16px;"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
            </div>
        </header>

        <div class="profile-container">
            <div class="profile-card profile-sidebar">
                <div class="profile-avatar-wrapper">
                    <img id="main-avatar" src="https://ui-avatars.com/api/?name=User&background=3b82f6&color=fff&size=120" alt="Avatar">
                    <input type="file" id="input-avatar" accept="image/*" style="display: none;">
                    <button class="btn-upload" onclick="document.getElementById('input-avatar').click()"><i class="fa-solid fa-camera"></i></button>
                </div>
                <h2 id="display-name">Loading...</h2>
                <p id="display-role" class="text-muted">Loading...</p>
                <div class="profile-stats">
                    <div class="stat-item">
                        <span class="stat-value">Active</span>
                        <span class="stat-label">Status</span>
                    </div>
                </div>
            </div>

            <div class="profile-card profile-details">
                <div class="tabs">
                    <button class="tab-btn active" onclick="switchTab('general')">Thông tin chung</button>
                    <button class="tab-btn" onclick="switchTab('security')">Bảo mật (Đổi MK)</button>
                </div>

                <form id="form-general" class="profile-form active-form" onsubmit="updateProfile(event)">
                    <div class="form-group">
                        <label>Họ và tên</label>
                        <input type="text" id="input-name" placeholder="Nhập họ tên...">
                    </div>
                    <div class="form-group">
                        <label>Tên đăng nhập (Username / ID)</label>
                        <input type="text" id="input-username" required>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="input-email" placeholder="example@gmail.com">
                    </div>
                    <div class="form-group">
                        <label>Số điện thoại</label>
                        <input type="text" id="input-phone" placeholder="09xxxxxxx">
                    </div>
                    <button type="submit" class="btn-primary">Lưu thay đổi</button>
                </form>

                <form id="form-security" class="profile-form" style="display:none;" onsubmit="updatePassword(event)">
                    <div class="form-group">
                        <label>Mật khẩu cũ</label>
                        <input type="password" id="input-old-password" required>
                    </div>
                    <div class="form-group">
                        <label>Mật khẩu mới</label>
                        <input type="password" id="input-new-password" required>
                    </div>
                    <div class="form-group">
                        <label>Xác nhận mật khẩu mới</label>
                        <input type="password" id="input-confirm-password" required>
                    </div>
                    <button type="submit" class="btn-primary">Đổi mật khẩu</button>
                </form>
            </div>
        </div>
    </main>

    <div id="toast" class="toast">Đã lưu thành công!</div>

    <script type="module" src="/Website/profile/script.js"></script>
    <script>
        function handleLogout() {
            localStorage.removeItem('token');
            localStorage.removeItem('isLoggedIn');
            localStorage.removeItem('currentUser');
            window.location.href = '/Website/username/login.html';
        }
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.profile-form').forEach(f => f.style.display = 'none');
            if (tab === 'general') {
                document.querySelectorAll('.tab-btn')[0].classList.add('active');
                document.getElementById('form-general').style.display = 'flex';
            } else {
                document.querySelectorAll('.tab-btn')[1].classList.add('active');
                document.getElementById('form-security').style.display = 'flex';
            }
        }
    </script>
</body>
</html>
